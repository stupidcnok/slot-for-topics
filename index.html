<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rainbow Input Project</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #f0f0f0;
        }

        #name-input {
            padding: 10px;
            font-size: 1.5rem;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 8px;
        }

        #display-name {
            font-size: 4rem;
            font-weight: 900;
            /* Rainbow Gradient */
            background: linear-gradient(to right, red, orange, yellow, green, blue, indigo, violet);
            /* Clip the background to the text */
            -webkit-background-clip: text;
            background-clip: text;
            /* Make text transparent to show the background */
            color: transparent;
            /* Animation for that extra "vibe" */
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to { background-position: 200% center; }
        }
    </style>
</head>
<body>

    <input type="text" id="name-input" placeholder="Type a name..." oninput="updateName()">
    <div id="display-name"></div>

    <script>
        function updateName() {
            const input = document.getElementById('name-input').value;
            document.getElementById('display-name').innerText = input;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Clay Slots</title>
</head>
<body class="bg-sky-100">
    <div x-data="{
        activeTab: 'game',
        mode: 'Kids',
        name: '',
        adjective: '-----',
        subject: '-----',
        isRolling: false,
        dashboardData: [],
        allWords: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',

        async init() {
            // Fetch Word Bank
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1); // Removes header row
            await this.fetchDashboard();
        },

        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            this.dashboardData = await res.json();
            this.dashboardData.shift(); // Remove headers
        },

        drawTopic() {
            if (!this.name) { alert('Please enter your name!'); return; }
            
            // Filter using index 1 (Category) and index 2 (Type)
            let adjectives = this.allWords.filter(w => w[1] == this.mode && w[2] == 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] == this.mode && w[2] == 'Subject').map(w => w[0]);
            
            if (adjectives.length === 0 || subjects.length === 0) { alert('Data loading error!'); return; }

            this.isRolling = true;
            let count = 0;
            let interval = setInterval(async () => {
                this.adjective = adjectives[Math.floor(Math.random() * adjectives.length)];
                this.subject = subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    this.isRolling = false;
                    let topic = this.adjective + ' ' + this.subject;
                    await this.saveSpin(this.name, topic);
                }
            }, 100);
        },

        async saveSpin(name, topic) {
            await fetch(this.apiUrl, {
                method: 'POST',
                body: JSON.stringify({ name: name, topic: topic })
            });
            await this.fetchDashboard();
            alert('Saved to Gallery!');
        }
    }" class="min-h-screen p-4 flex items-center justify-center">
        <div class="w-full max-w-md bg-white p-6 rounded-3xl shadow-2xl">
            <div class="flex gap-2 mb-4">
                <button @click="activeTab='game'" class="flex-1 py-2 bg-sky-500 text-white rounded-xl font-bold">Game</button>
                <button @click="activeTab='dashboard'" class="flex-1 py-2 bg-gray-200 text-gray-700 rounded-xl font-bold">Dashboard</button>
            </div>

            <!-- Game View -->
            <div x-show="activeTab=='game'">
                <select x-model="mode" class="w-full p-2 mb-4 border rounded-xl">
                    <option value="Kids">Kids Mode</option>
                    <option value="Adults">Adults Mode</option>
                </select>
                <input x-model="name" type="text" placeholder="Enter your name..." class="w-full p-4 border-2 rounded-2xl mb-4">
                <button @click="drawTopic()" :disabled="isRolling" class="w-full bg-orange-400 p-4 rounded-2xl text-white font-black text-xl">Spin!</button>
                <div class="mt-6 text-center text-2xl font-bold text-sky-800" x-text="adjective + ' ' + subject"></div>
            </div>
            
            <!-- Dashboard View -->
            <div x-show="activeTab=='dashboard'">
                <h1 class="text-xl font-bold text-center mb-4">Creations Gallery 🏆</h1>
                <div class="space-y-2">
                    <template x-for="row in dashboardData.slice().reverse()">
                        <div class="p-2 border-b text-sm">
                            <span class="font-bold" x-text="row[0]"></span>: <span x-text="row[1]"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

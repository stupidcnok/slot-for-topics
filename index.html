<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Magic Box</title>
</head>
<!-- Sky-blue base with a subtle sketch pattern background -->
<body class="bg-sky-50 font-sans">
    <div x-data="{
        activeTab: 'game',
        name: '',
        adjective: '---',
        subject: '---',
        isRolling: false,
        dashboardData: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',
        async init() {
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1);
            await this.fetchDashboard();
        },
        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            let data = await res.json();
            this.dashboardData = data.slice(1);
        },
        drawTopic() {
            if (!this.name) { alert('Please enter your name, Artist!'); return; }
            let adjectives = this.allWords.filter(w => w[1] === 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] === 'Subject').map(w => w[0]);
            this.isRolling = true;
            let count = 0;
            let interval = setInterval(() => {
                this.adjective = adjectives[Math.floor(Math.random() * adjectives.length)];
                this.subject = subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    this.isRolling = false;
                    this.saveSpin(this.name, this.adjective + ' ' + this.subject);
                }
            }, 100);
        },
        async saveSpin(name, topic) {
            await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify({ name: name, topic: topic }) });
            await this.fetchDashboard();
        }
    }" class="min-h-screen p-4 flex items-center justify-center">

        <!-- Main Container: Translucent "bubble" card -->
        <div class="w-full max-w-sm bg-white/80 backdrop-blur-md p-8 rounded-[2rem] shadow-xl border-4 border-white">
            <h1 class="text-center font-extrabold text-4xl text-sky-600 mb-8 tracking-tight">Magic Box</h1>

            <!-- Pill-shaped Tabs -->
            <div class="flex gap-2 mb-8 bg-sky-100 p-1 rounded-full">
                <button @click="activeTab='game'" :class="activeTab=='game' ? 'bg-white text-sky-600 shadow-sm' : 'text-sky-400'" class="flex-1 py-3 rounded-full font-bold transition-all">Game</button>
                <button @click="activeTab='dashboard'" :class="activeTab=='dashboard' ? 'bg-white text-sky-600 shadow-sm' : 'text-sky-400'" class="flex-1 py-3 rounded-full font-bold transition-all">Dashboard</button>
            </div>

            <!-- Game View -->
            <div x-show="activeTab=='game'" class="space-y-6">
                <input x-model="name" type="text" placeholder="Artist Name..." class="w-full p-4 border-2 border-sky-100 rounded-full text-lg outline-none focus:border-sky-300 text-center">
                
                <button @click="drawTopic()" :disabled="isRolling" class="w-full bg-gradient-to-r from-sky-400 to-cyan-400 py-5 rounded-full text-white font-black text-xl shadow-[0_6px_0_0_rgb(8,145,178)] hover:brightness-110 active:shadow-none active:translate-y-[6px] transition-all">
                    Spin!
                </button>
                
                <div class="mt-4 text-center text-3xl font-black text-sky-800 py-8 bg-white rounded-3xl border-2 border-dashed border-sky-200" x-text="adjective + ' ' + subject"></div>
            </div>
            
            <!-- Dashboard View -->
            <div x-show="activeTab=='dashboard'" class="space-y-3">
                <template x-for="row in dashboardData.slice(-5).reverse()">
                    <div class="bg-white p-4 rounded-2xl border border-sky-100 flex justify-between items-center shadow-sm">
                        <span class="text-[10px] font-black text-sky-400 uppercase" x-text="row[0]"></span>
                        <span class="font-bold text-sky-900" x-text="row[1]"></span>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>

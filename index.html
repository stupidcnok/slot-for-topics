<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Magic Box</title>
    <style>
        /* Static Rainbow Border Style */
        .rainbow-frame {
            border: 6px solid transparent;
            border-radius: 1.5rem;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(to right, white, white), 
                              linear-gradient(to right, #f87171, #fb923c, #facc15, #4ade80, #60a5fa, #a78bfa);
        }
    </style>
</head>
<body class="bg-[#FDF6E3] font-sans">
    <div x-data="{
        activeTab: 'game',
        name: '',
        adjective: '---',
        subject: '---',
        isRolling: false,
        dashboardData: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',
        async init() {
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1);
            await this.fetchDashboard();
        },
        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            let data = await res.json();
            this.dashboardData = data.slice(1);
        },
        drawTopic() {
            if (!this.name) { alert('Please enter your name, Artist!'); return; }
            let adjectives = this.allWords.filter(w => w[1] === 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] === 'Subject').map(w => w[0]);
            this.isRolling = true;
            let count = 0;
            let interval = setInterval(() => {
                this.adjective = adjectives[Math.floor(Math.random() * adjectives.length)];
                this.subject = subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    this.isRolling = false;
                    this.saveSpin(this.name, this.adjective + ' ' + this.subject);
                }
            }, 100);
        },
        async saveSpin(name, topic) {
            await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify({ name: name, topic: topic }) });
            await this.fetchDashboard();
        }
    }" class="min-h-screen p-4 flex items-center justify-center">

        <div class="w-full max-w-md bg-white p-6 rounded-3xl border-4 border-dashed border-orange-200 shadow-[10px_10px_0px_0px_rgba(251,191,36,0.3)]">
            <h1 class="text-center font-black text-3xl text-orange-500 mb-6">✨ Magic Box 🎨</h1>

            <div class="flex gap-2 mb-6">
                <button @click="activeTab='game'" :class="activeTab=='game' ? 'bg-blue-400 text-white' : 'bg-gray-100'" class="flex-1 py-3 rounded-2xl font-black transition-all">Game</button>
                <button @click="activeTab='dashboard'" :class="activeTab=='dashboard' ? 'bg-green-400 text-white' : 'bg-gray-100'" class="flex-1 py-3 rounded-2xl font-black transition-all">Dashboard</button>
            </div>

            <div x-show="activeTab=='game'" class="flex flex-col items-center gap-6">
                <!-- Rainbow Frame Input -->
                <input x-model="name" type="text" placeholder="Artist Name..." class="w-full p-4 rounded-xl text-center font-bold rainbow-frame outline-none">
                
                <button @click="drawTopic()" :disabled="isRolling" class="w-40 h-40 bg-yellow-400 rounded-full border-4 border-black font-black text-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-300 active:shadow-none active:translate-x-[6px] active:translate-y-[6px] transition-all">
                    SPIN<br>IT!
                </button>
                
                <div class="w-full text-center text-2xl font-black text-purple-600 py-6 bg-purple-50 rounded-2xl border-2 border-dashed border-purple-200" x-text="adjective + ' ' + subject"></div>
            </div>
            
            <div x-show="activeTab=='dashboard'" class="grid grid-cols-2 gap-4">
                <template x-for="row in dashboardData.slice(-4).reverse()">
                    <div class="bg-blue-50 p-4 rounded-2xl border-2 border-blue-100 text-center">
                        <p class="text-[10px] font-black text-blue-400 uppercase" x-text="row[0]"></p>
                        <p class="font-bold text-blue-900 text-sm" x-text="row[1]"></p>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>

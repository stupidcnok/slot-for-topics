<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Importing a hand-written style font -->
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <title>Magic Box</title>
    <style>
        body { font-family: 'Architects Daughter', cursive; }
        
        /* The Hand-Drawn Rainbow Frame */
        .sketch-frame {
            border: 4px dashed #60a5fa;
            border-radius: 255px 15px 225px 15px/15px 225px 15px 255px;
        }

        /* The Spin Button: Circular Sketch */
        .spin-button {
            border: 4px solid #000;
            border-radius: 50%;
            transition: all 0.2s;
        }
    </style>
</head>
<body class="bg-[#FDF6E3] p-4 flex items-center justify-center min-h-screen">

    <div x-data="{
        activeTab: 'game',
        name: '',
        topic: '---',
        isRolling: false,
        dashboardData: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',
        async init() {
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1);
            await this.fetchDashboard();
        },
        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            let data = await res.json();
            this.dashboardData = data.slice(1);
        },
        drawTopic() {
            if (!this.name) { alert('Who is the Artist?'); return; }
            let adjectives = this.allWords.filter(w => w[1] === 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] === 'Subject').map(w => w[0]);
            this.isRolling = true;
            let count = 0;
            let interval = setInterval(() => {
                this.topic = adjectives[Math.floor(Math.random() * adjectives.length)] + ' ' + subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    this.isRolling = false;
                    this.saveSpin(this.name, this.topic);
                }
            }, 100);
        },
        async saveSpin(name, topic) {
            await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify({ name: name, topic: topic }) });
            await this.fetchDashboard();
        }
    }" class="w-full max-w-sm bg-[#FDF6E3] border-4 border-dashed border-gray-400 p-6 rounded-[2rem] shadow-xl">

        <!-- Top Nav -->
        <div class="flex gap-2 mb-6">
            <button @click="activeTab='game'" class="flex-1 py-2 border-2 border-blue-400 bg-blue-100 rounded-lg font-bold">Game</button>
            <button @click="activeTab='dashboard'" class="flex-1 py-2 border-2 border-green-400 bg-green-100 rounded-lg font-bold">Dashboard</button>
        </div>

        <!-- Game View -->
        <div x-show="activeTab=='game'" class="flex flex-col items-center gap-4">
            <!-- Sketchy Name Box -->
            <input x-model="name" type="text" placeholder="Artist Name..." class="w-full p-3 border-2 border-gray-400 bg-transparent rounded-xl text-center text-lg">
            
            <!-- Sketchy Spin Button -->
            <button @click="drawTopic()" :disabled="isRolling" class="w-32 h-32 spin-button bg-yellow-300 font-black text-xl hover:bg-yellow-200">
                SPIN<br>IT!
            </button>
            
            <!-- Result Area -->
            <div class="w-full text-center text-2xl py-6 border-4 border-dashed border-gray-300 rounded-lg" x-text="topic"></div>
        </div>
        
        <!-- Dashboard View -->
        <div x-show="activeTab=='dashboard'" class="grid grid-cols-2 gap-2 h-80 overflow-y-auto">
            <template x-for="row in dashboardData.slice().reverse()">
                <div class="bg-white p-2 border-2 border-gray-300 rounded-lg text-center text-sm">
                    <p class="text-[10px] text-gray-400" x-text="row[0]"></p>
                    <p class="font-bold" x-text="row[1]"></p>
                </div>
            </template>
        </div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Magic Box</title>
    <style>
        /* Creamy background with subtle doodle-like dots */
        body {
            background-color: #FDF6E3;
            background-image: radial-gradient(#F3E8C6 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Rainbow Frame */
        .rainbow-frame {
            border: 4px solid transparent;
            border-radius: 12px;
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            background-image: linear-gradient(to right, white, white), 
                              linear-gradient(to right, #f87171, #fb923c, #facc15, #4ade80, #60a5fa, #a78bfa);
        }

        /* Soft dashed outer border for the card */
        .main-card {
            border: 4px dashed #FDE68A;
        }
    </style>
</head>
<body class="p-4 flex items-center justify-center min-h-screen">

    <div x-data="{
        activeTab: 'game',
        name: '',
        topic: '---',
        isRolling: false,
        dashboardData: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',
        async init() {
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1);
            await this.fetchDashboard();
        },
        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            let data = await res.json();
            this.dashboardData = data.slice(1);
        },
        drawTopic() {
            if (!this.name) { alert('Artist, please enter your name!'); return; }
            let adjectives = this.allWords.filter(w => w[1] === 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] === 'Subject').map(w => w[0]);
            this.isRolling = true;
            let count = 0;
            let interval = setInterval(() => {
                this.topic = adjectives[Math.floor(Math.random() * adjectives.length)] + ' ' + subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 15) {
                    clearInterval(interval);
                    this.isRolling = false;
                    this.saveSpin(this.name, this.topic);
                }
            }, 100);
        },
        async saveSpin(name, topic) {
            await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify({ name: name, topic: topic }) });
            await this.fetchDashboard();
        }
    }" class="w-full max-w-sm bg-white p-8 rounded-[2rem] shadow-2xl main-card">

        <!-- Title -->
        <h1 class="text-center font-black text-3xl text-orange-500 mb-6 flex items-center justify-center gap-2">
            ✨ Magic Box 🎨
        </h1>

        <!-- Nav -->
        <div class="flex gap-3 mb-8">
            <button @click="activeTab='game'" :class="activeTab=='game' ? 'bg-blue-400 text-white' : 'bg-gray-100'" class="flex-1 py-3 rounded-xl font-bold transition-all">Game</button>
            <button @click="activeTab='dashboard'" :class="activeTab=='dashboard' ? 'bg-gray-100' : 'bg-gray-100'" class="flex-1 py-3 rounded-xl font-bold transition-all">Dashboard</button>
        </div>

        <!-- Game View -->
        <div x-show="activeTab=='game'" class="flex flex-col items-center gap-6">
            <input x-model="name" type="text" placeholder="Your name..." class="w-full p-4 text-center font-bold text-lg rainbow-frame outline-none">
            
            <button @click="drawTopic()" :disabled="isRolling" class="w-40 h-40 bg-yellow-400 rounded-full border-4 border-black font-black text-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:scale-105 active:scale-95 transition-all">
                SPIN<br>IT!
            </button>
            
            <div class="w-full text-center text-2xl font-black text-purple-600 py-6 bg-purple-50 rounded-2xl border-2 border-dashed border-purple-200" x-text="topic"></div>
        </div>
        
        <!-- Dashboard View: 2x2 Grid -->
        <div x-show="activeTab=='dashboard'" class="grid grid-cols-2 gap-3 h-80 overflow-y-auto">
            <template x-for="row in dashboardData.slice().reverse()">
                <div class="bg-blue-50 p-3 rounded-xl border-2 border-blue-100 text-center">
                    <p class="text-[10px] font-bold text-blue-400 uppercase" x-text="row[0]"></p>
                    <p class="font-bold text-blue-900 text-sm" x-text="row[1]"></p>
                </div>
            </template>
        </div>
    </div>
</body>
</html>

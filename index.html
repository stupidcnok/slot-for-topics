<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <title>Magic Box</title>
</head>
<body class="bg-gray-50">
    <div x-data="{
        activeTab: 'game',
        name: '',
        adjective: '-----',
        subject: '-----',
        isRolling: false,
        dashboardData: [],
        allWords: [],
        apiUrl: 'https://script.google.com/macros/s/AKfycbzxS9b-L0YyxtK_7qNe6OpO0tHWspAgHjT-6axPjNwyBKEw2XRJ5w9nimMHg3EoRusNoQ/exec',
        async init() {
            let res = await fetch(this.apiUrl + '?function=getWords');
            let data = await res.json();
            this.allWords = data.slice(1);
            await this.fetchDashboard();
        },
        async fetchDashboard() {
            let res = await fetch(this.apiUrl);
            let data = await res.json();
            this.dashboardData = data.slice(1);
        },
        drawTopic() {
            if (!this.name) { alert('Please enter your name!'); return; }
            let adjectives = this.allWords.filter(w => w[1] === 'Adjective').map(w => w[0]);
            let subjects = this.allWords.filter(w => w[1] === 'Subject').map(w => w[0]);
            this.isRolling = true;
            let count = 0;
            let interval = setInterval(async () => {
                this.adjective = adjectives[Math.floor(Math.random() * adjectives.length)];
                this.subject = subjects[Math.floor(Math.random() * subjects.length)];
                count++;
                if (count > 20) {
                    clearInterval(interval);
                    this.isRolling = false;
                    let topic = this.adjective + ' ' + this.subject;
                    await this.saveSpin(this.name, topic);
                }
            }, 100);
        },
        async saveSpin(name, topic) {
            await fetch(this.apiUrl, { method: 'POST', body: JSON.stringify({ name: name, topic: topic }) });
            await this.fetchDashboard();
        }
    }" class="min-h-screen p-4 flex items-center justify-center font-sans">
        
        <div class="w-full max-w-md bg-white p-6 rounded-2xl shadow-sm border border-gray-200">
            <h1 class="text-center font-bold text-2xl text-gray-800 mb-6">Magic Box</h1>

            <div class="flex gap-2 mb-6">
                <button @click="activeTab='game'" :class="activeTab=='game' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'" class="flex-1 py-2 rounded-lg font-bold transition-colors">Game</button>
                <button @click="activeTab='dashboard'" :class="activeTab=='dashboard' ? 'bg-gray-800 text-white' : 'bg-gray-100 text-gray-600'" class="flex-1 py-2 rounded-lg font-bold transition-colors">Dashboard</button>
            </div>

            <div x-show="activeTab=='game'">
                <input x-model="name" type="text" placeholder="Your name..." class="w-full p-3 border border-gray-300 rounded-lg mb-4">
                <button @click="drawTopic()" :disabled="isRolling" class="w-full bg-blue-600 p-3 rounded-lg text-white font-bold hover:bg-blue-700">Spin!</button>
                <div class="mt-8 text-center text-2xl font-bold text-gray-700 py-6 border-2 border-dashed border-gray-200 rounded-lg" x-text="adjective + ' ' + subject"></div>
            </div>
            
            <div x-show="activeTab=='dashboard'">
                <div class="space-y-2">
                    <template x-for="row in dashboardData.slice().reverse()">
                        <div class="bg-gray-50 p-3 rounded-lg border border-gray-100 flex justify-between">
                            <span class="text-xs text-gray-400 font-bold uppercase" x-text="row[0]"></span>
                            <span class="font-bold text-gray-800 text-sm" x-text="row[1]"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
